name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Pi/Linux backend: real drivers (libgpiod, spidev, ALSA). x86_64 here, but
  # the sources are arch-independent C++ -- this proves the hardware backend
  # compiles and links.
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config libgpiod-dev libasound2-dev
      - name: Configure
        run: cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5
      - name: Build
        run: cmake --build build

  # macOS simulator backend: LVGL in an SDL window, miniaudio/CoreAudio.
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: brew install ninja sdl2
      - name: Configure
        run: cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5
      - name: Build
        run: cmake --build build
